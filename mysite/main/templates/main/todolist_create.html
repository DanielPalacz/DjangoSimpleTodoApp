{% extends "main/base.html" %}

{% block title %}
Create new todolist.
{% endblock %}

{% block content %}
<h1>Create new todolist.</h1>

<form method="post" action="/create/" class="form-group">
    {% csrf_token %}
    <div class="input-group mb-3">
        <div class="input-group-prepend">
            <button type="submit" name="save" class="btn btn-success">Create</button>
            {{form.name}}
        </div>
    </div>
</form>


{% endblock %}
